# Example config for OCR (fast_ai.ocr.OCR.build)
#
# Vision-based OCR. Providers must support vision input.

prompt: "Распознай весь текст на изображении. Верни только распознанный текст, без пояснений."

max_rounds: 2

providers:
  - type: ollama
    base_url: http://localhost:11434
    model: qwen2.5vl:7b
    retries: 2
    timeout: 120

  - type: openai
    base_url: https://api.openai.com
    model: gpt-4o
    token: ${OPENAI_API_KEY}
    retries: 1
    timeout: 120
