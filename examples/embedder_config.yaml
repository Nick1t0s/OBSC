# Example config for Embedder (processor.simple_processor.text.embedder.Embedder.build)
#
# Fault-tolerant embeddings. Used by TextProcessor for chunk embeddings.

max_rounds: 2

providers:
  # Ollama embeddings — POST {base_url}/api/embed (Ollama >= 0.2.0)
  - type: ollama
    base_url: http://localhost:11434
    model: nomic-embed-text
    retries: 2
    timeout: 60

  # OpenAI-compatible embeddings — POST {base_url}/v1/embeddings
  - type: openai
    base_url: https://api.openai.com
    model: text-embedding-3-small
    token: ${OPENAI_API_KEY}
    retries: 1
    timeout: 60
